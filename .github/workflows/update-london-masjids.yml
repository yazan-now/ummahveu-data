name: Update London Masjid Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Generate London masjid JSON
        run: ruby scripts/update_london_masjids.rb

      - name: Validate JSON shape
        run: ruby -rjson -e 'data = JSON.parse(File.read("london-masjids.json")); abort("bad version") unless data["version"] == 1; abort("bad count") unless data["mosques"].length == 4'

      - name: Commit updated feed
        run: |
          if git diff --quiet london-masjids.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "ummahveu-data-bot"
          git config user.email "ummahveu-data-bot@users.noreply.github.com"
          git add london-masjids.json
          git commit -m "chore: update London masjid data"
          git push
